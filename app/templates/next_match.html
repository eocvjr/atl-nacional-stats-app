<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Previa del partido - Atlético Nacional</title>
  <style>
    :root{
      --bg:#050b09;
      --card:linear-gradient(180deg, rgba(13,22,18,.96), rgba(5,10,8,.98));
      --border:rgba(125,240,177,.12);
      --text:#eefbf3;
      --muted:#8fa59a;
      --green:#00c26a;
      --green-2:#7df0b1;
      --shadow:0 20px 50px rgba(0,0,0,.38);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0,194,106,.12), transparent 24%),
        linear-gradient(135deg, #04100b 0%, #05090b 45%, #020507 100%);
      color:var(--text);
      padding:28px;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    .top-link{
      display:inline-block;
      margin-bottom:18px;
      color:var(--green-2);
      text-decoration:none;
      font-size:14px;
    }

    .hero, .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
    }

    .eyebrow{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:12px;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 12px;
      font-size:46px;
      line-height:1.05;
    }

    .match-meta{
      color:var(--muted);
      font-size:16px;
    }

    .teams{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:20px;
      align-items:center;
      margin-top:26px;
    }

    .team{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:22px;
      padding:22px;
    }

    .team-label{
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      font-size:12px;
      margin-bottom:8px;
    }

    .team-name{
      font-size:28px;
      font-weight:900;
    }

    .vs{
      width:54px;
      height:54px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#020807;
      border:1px solid rgba(125,240,177,.18);
      font-weight:900;
    }

    .grid{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:22px;
    }

    .section-title{
      margin:0 0 6px;
      font-size:24px;
      letter-spacing:.04em;
    }

    .section-subtitle{
      color:var(--muted);
      margin-bottom:18px;
      font-size:14px;
    }

    .lineup-list{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }

    .player-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
    }

    .player-main{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .player-name{
      font-weight:800;
    }

    .player-pos{
      color:var(--muted);
      font-size:12px;
    }

    .rating{
      color:var(--green-2);
      font-weight:900;
    }

    .odds-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .odd{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .odd-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.1em;
    }

    .odd-value{
      font-size:22px;
      font-weight:900;
      color:var(--green-2);
    }

    .muted{
      color:var(--muted);
    }

    @media (max-width:900px){
      .grid{
        grid-template-columns:1fr;
      }

      .teams{
        grid-template-columns:1fr;
      }

      .lineup-list{
        grid-template-columns:1fr;
      }

      .vs{
        margin:auto;
      }

      h1{
        font-size:34px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="top-link" href="/">← Volver al dashboard</a>

    <section class="hero">
      <div class="eyebrow">Previa del partido</div>
      <h1 id="match-title">Cargando previa...</h1>
      <div class="match-meta" id="match-meta"></div>

      <div class="teams">
        <div class="team">
          <div class="team-label">Local</div>
          <div class="team-name" id="home-team">-</div>
        </div>

        <div class="vs">VS</div>

        <div class="team">
          <div class="team-label">Visitante</div>
          <div class="team-name" id="away-team">-</div>
        </div>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">Última alineación de Nacional</h2>
        <div class="section-subtitle">Usada como referencia previa al próximo partido.</div>
        <div id="nacional-lineup" class="lineup-list">
          <div class="muted">Cargando...</div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">Cuotas</h2>
        <div class="section-subtitle">Mercado principal disponible.</div>
        <div id="odds" class="odds-grid">
          <div class="muted">Cargando cuotas...</div>
        </div>
      </section>
    </div>
  </div>

  <script src="/static/next_match.js"></script>
</body>
</html>
