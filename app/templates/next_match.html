<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Previa del partido - Atlético Nacional</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='next_match.css') }}">
</head>

<body>
  <div class="container">
    <a class="top-link" href="/">← Volver al dashboard</a>

    <section class="hero">
      <div class="eyebrow">Previa del partido</div>
      <h1 id="match-title">Cargando previa...</h1>
      <div class="match-meta" id="match-meta"></div>

      <div class="teams">
        <div class="team">
          <div class="team-label">Local</div>
          <div class="team-name" id="home-team">-</div>
        </div>

        <div class="vs">VS</div>

        <div class="team">
          <div class="team-label">Visitante</div>
          <div class="team-name" id="away-team">-</div>
        </div>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">Última alineación de Nacional</h2>
        <div class="section-subtitle">Usada como referencia previa al próximo partido.</div>

        <div id="nacional-lineup" class="lineup-list">
          <div class="muted">Cargando...</div>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">Cuotas</h2>
        <div class="section-subtitle">Mercado principal disponible.</div>

        <div id="odds" class="odds-grid">
          <div class="muted">Cargando cuotas...</div>
        </div>
      </section>
    </div>
  </div>

  <script src="{{ url_for('static', filename='next_match.js') }}"></script>
</body>
</html>
